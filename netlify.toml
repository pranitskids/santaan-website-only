[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/admin/*"
  to = "/"
  status = 302
  force = true

[[redirects]]
  from = "/login"
  to = "/"
  status = 302
  force = true

[[redirects]]
  from = "/profile"
  to = "/"
  status = 302
  force = true

[[redirects]]
  from = "/blog"
  to = "/fertility-insights"
  status = 301
  force = true

[[redirects]]
  from = "/bengaluru-aecs-layout"
  to = "/ivf-clinic-bangalore-aecs-layout"
  status = 301
  force = true

[[redirects]]
  from = "/contact"
  to = "/contact-centres"
  status = 301
  force = true

[[redirects]]
  from = "/doctors"
  to = "/our-doctors"
  status = 301
  force = true

[[redirects]]
  from = "/at-home-testing"
  to = "/at-home-fertility-testing"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/training/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/blogs"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
