name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Define environment variables needed for the build/tests to run
    # For a real deployment, these should be added to GitHub Secrets
    env:
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      BETTER_AUTH_SECRET: "ci-dummy-secret-key-do-not-use-in-prod"
      NEXTAUTH_SECRET: "ci-dummy-nextauth-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      ANTHROPIC_API_KEY: "ci-dummy-anthropic-key"
      OPENROUTER_API_KEY: "ci-dummy-openrouter-key"
      GROQ_API_KEY: "ci-dummy-groq-key"
      GOOGLE_AI_API_KEY: "ci-dummy-google-key"
      NEXT_PUBLIC_GROQ_API_KEY: "ci-dummy-groq-key"
      NEXT_PUBLIC_GOOGLE_AI_API_KEY: "ci-dummy-google-key"
      BHASH_USER: "ci-user"
      BHASH_PASS: "ci-pass"
      BHASH_SENDER: "ci-sender"
      
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Build
      run: npm run build
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
